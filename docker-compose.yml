version: '3.8'

services:
  nginx:
    image: nginx:latest
    ports:
      - "8080:5000"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - receiver

  receiver:
    build: .
    command: uvicorn receiver:app --host 0.0.0.0 --port 8000
    volumes:
      - ./data:/app/data

  brain:
    build: .
    command: python3 brain.py
    volumes:
      - ./data:/app/data
    network_mode: none

  dashboard:
    build: .
    command: streamlit run dashboard.py --server.port=8501 --server.address=0.0.0.0
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
